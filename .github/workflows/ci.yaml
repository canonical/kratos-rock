name: ci
run-name: CI for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "rockcraft.yaml"
      - ".github/workflows/**.yaml"
  pull_request:
    branches:
      - "*"

jobs:
  get-architectures:
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.parse.outputs.architectures }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse platforms from rockcraft.yaml
        id: parse
        run: |
          archs=$(yq -o=json -I=0 '.platforms | keys' rockcraft.yaml)
          echo "Found architectures: $archs"
          echo "architectures=$archs" >> "$GITHUB_OUTPUT"

  build:
    needs: get-architectures
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.get-architectures.outputs.architectures) }}
    uses: canonical/identity-team/.github/workflows/_rock-build.yaml@e722462193a22c5126d622ebfe9916d83b415d6d # v1.12.0
    with:
      structure-tests-enabled: true
      architecture: ${{ matrix.architecture }}

  gh-publish:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build
    uses: canonical/identity-team/.github/workflows/_rock-gh-publish-third-party.yaml@e722462193a22c5126d622ebfe9916d83b415d6d # v1.12.0

  oci-publish:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build
    uses: canonical/identity-team/.github/workflows/_rock-oci-publish.yaml@e722462193a22c5126d622ebfe9916d83b415d6d # v1.12.0
    with:
      edge-release: false
      eol-stable-release: "3 month"
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  scan:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: gh-publish
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    uses: canonical/identity-team/.github/workflows/_rock-scan.yaml@e722462193a22c5126d622ebfe9916d83b415d6d # v1.12.0
    with:
      image: ${{ needs.gh-publish.outputs.image }}

  oci-update-pr:
    needs: [gh-publish, scan]
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
      pull-requests: write
    uses: canonical/identity-team/.github/workflows/oci-update-pr.yaml@e722462193a22c5126d622ebfe9916d83b415d6d # v1.12.0
    with:
        oci-image: ${{ needs.gh-publish.outputs.image }}
        repository: canonical/kratos-operator
    secrets:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
