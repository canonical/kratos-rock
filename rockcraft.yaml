name: kratos
base: bare
build-base: ubuntu@22.04
version: "26.2.0"
summary: Ory Kratos identity server
description: |
  Ory Kratos is an Identity and User Management system.
license: Apache-2.0
run-user: _daemon_
platforms:
  amd64:

services:
  kratos:
    override: replace
    command: kratos serve all
    startup: enabled

parts:
  kratos:
    plugin: go
    build-snaps:
      - go/1.26/stable
    build-environment:
      - CGO_ENABLED: "0"
    source: https://github.com/ory/kratos
    source-type: git
    source-tag: v26.2.0
    stage-packages:
      - ca-certificates_data
      - base-files_chisel
    override-build: |
      # Set the necessary flags
      src_config_path="github.com/ory/kratos/driver/config"
      build_ver="${src_config_path}.Version"
      build_hash="${src_config_path}.Commit"
      build_date="${src_config_path}.Date"
      go_linker_flags="-s \
                       -w \
                       -X ${build_ver}=$(git -C "${CRAFT_PART_SRC}" describe --tags) \
                       -X ${build_hash}=$(git -C "${CRAFT_PART_SRC}" rev-parse HEAD) \
                       -X ${build_date}=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      # Addressing CVEs
      # CVE-2026-39883: go.opentelemetry.io/otel/sdk
      go mod edit -replace go.opentelemetry.io/otel/sdk=go.opentelemetry.io/otel/sdk@v1.43.0
      # CVE-2026-34986: github.com/go-jose/go-jose
      go mod edit -replace github.com/go-jose/go-jose/v3=github.com/go-jose/go-jose/v3@v3.0.5
      go mod edit -replace github.com/go-jose/go-jose/v4=github.com/go-jose/go-jose/v4@v4.1.4
      # CVE-2026-34040, CVE-2026-33997, CVE-2025-15558: github.com/docker/cli
      go mod edit -replace github.com/docker/cli=github.com/docker/cli@v29.4.1+incompatible
      # CVE-2026-33816: github.com/jackc/pgx/v5
      go mod edit -replace github.com/jackc/pgx/v5=github.com/jackc/pgx/v5@v5.9.2
      # General security updates
      go mod edit -replace google.golang.org/protobuf=google.golang.org/protobuf@v1.36.11
      
      go mod tidy
      go mod download
      go build -ldflags="${go_linker_flags}" -o ${CRAFT_PART_INSTALL}/bin/kratos

  deb-security-manifest:
    plugin: make
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: gen_manifest
